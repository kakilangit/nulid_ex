name: Release

# This workflow handles publishing the nulid package to hex.pm and creating GitHub releases.
#
# Key Features:
# - Retry-safe: Checks if the version is already published before attempting to publish
# - Version consistency: Verifies mix.exs version matches the git tag
# - Sequential: test → publish → create-release
#
# Publishing:
# - Publishes to hex.pm using HEX_API_KEY secret
# - NIF is precompiled during the publish step

on:
  push:
    tags:
      - "v*"

jobs:
  check-version:
    name: Check Version Consistency
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag-version: ${{ steps.get-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Get version from mix.exs
        id: get-version
        run: |
          VERSION=$(grep '@version "' mix.exs | sed 's/.*@version "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "mix.exs version: $VERSION"
      - name: Get version from tag
        id: get-tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $TAG_VERSION"
      - name: Verify versions match
        run: |
          if [ "${{ steps.get-version.outputs.version }}" != "${{ steps.get-tag.outputs.version }}" ]; then
            echo "Version mismatch: mix.exs has ${{ steps.get-version.outputs.version }}, tag has ${{ steps.get-tag.outputs.version }}"
            exit 1
          fi
          echo "Versions match: ${{ steps.get-version.outputs.version }}"

  test:
    name: Test Before Release
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88

      - name: Cache Elixir dependencies
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/nulid_nif/target
          key: ${{ runner.os }}-cargo-nif-${{ hashFiles('native/nulid_nif/Cargo.lock') }}

      - name: Fetch dependencies
        run: make deps

      - name: Run tests
        run: make test

  publish:
    name: Publish to hex.pm
    runs-on: ubuntu-latest
    needs: [check-version, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88

      - name: Cache Elixir dependencies
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/nulid_nif/target
          key: ${{ runner.os }}-cargo-nif-${{ hashFiles('native/nulid_nif/Cargo.lock') }}

      - name: Fetch dependencies
        run: make deps

      - name: Check if already published
        id: check-hex
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          echo "Checking if nulid@$VERSION is already published on hex.pm..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://hex.pm/api/packages/nulid/releases/$VERSION")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "nulid@$VERSION already published, skipping"
            echo "already-published=true" >> $GITHUB_OUTPUT
          else
            echo "nulid@$VERSION not published yet"
            echo "already-published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to hex.pm
        if: steps.check-hex.outputs.already-published == 'false'
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: make publish

  check-release:
    name: Check if GitHub Release Exists
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: check-version
    outputs:
      release-exists: ${{ steps.check-release.outputs.release-exists }}
    steps:
      - uses: actions/checkout@v5
      - name: Check if GitHub release exists
        id: check-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v${{ needs.check-version.outputs.version }}"
          echo "Checking if GitHub release for tag $TAG_NAME exists..."

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG_NAME")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "GitHub release for $TAG_NAME already exists"
            echo "release-exists=true" >> $GITHUB_OUTPUT
          else
            echo "GitHub release for $TAG_NAME does not exist"
            echo "release-exists=false" >> $GITHUB_OUTPUT
          fi

  create-release:
    name: Create GitHub Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [check-version, check-release, publish]
    if: always() && needs.check-release.outputs.release-exists == 'false' && needs.publish.result != 'failure'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using initial commit"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${{ github.ref_name }})
          else
            echo "Previous tag: $PREV_TAG"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..${{ github.ref_name }})
          fi

          echo "$CHANGELOG" > changelog.txt
          echo "Generated changelog with $(echo "$CHANGELOG" | wc -l) entries"

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ needs.check-version.outputs.version }}" == *"-"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ needs.check-version.outputs.version }}" \
            --notes-file changelog.txt \
            $PRERELEASE_FLAG
