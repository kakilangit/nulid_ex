name: "CI"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  elixir-ci:
    name: Elixir Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88
          components: rustfmt,clippy

      - name: Cache Elixir dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/nulid_nif/target
          key: ${{ runner.os }}-cargo-nif-${{ hashFiles('native/nulid_nif/Cargo.lock') }}

      - name: Fetch dependencies
        run: make deps

      - name: Format check
        run: make fmt-check

      - name: Clippy lint
        run: make clippy

      - name: Run tests
        run: make test
